name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Force uv to use a project-local cache directory in CI so the
  # `actions/cache` step can key on it deterministically.
  UV_CACHE_DIR: ${{ runner.temp }}/uv-cache

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # hatch-vcs needs history
      - uses: astral-sh/setup-uv@v6
        with:
          version: latest
          enable-cache: true
      - run: uv run --no-sync ruff check src/ tests/
      - run: uv run --no-sync ruff format --check src/ tests/

  typecheck:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          version: latest
          enable-cache: true
      - run: uv sync --all-extras --dev
      - run: uv run --no-sync mypy src/airflow_mcp

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # hatch-vcs reads history
      - uses: astral-sh/setup-uv@v6
        with:
          version: latest
          enable-cache: true
      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Sync dependencies
        run: uv sync --all-extras --dev --python ${{ matrix.python-version }}
      - name: Run tests
        run: uv run --no-sync --python ${{ matrix.python-version }} pytest -q
